version: '3.8'

services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    depends_on:
      - mongo

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - api

  mongo:
    image: mongo:6.0
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: