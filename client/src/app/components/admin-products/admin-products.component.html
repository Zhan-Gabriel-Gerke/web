<div class="admin-products-container">
  <h2>Manage Products</h2>

  <div *ngIf="error" class="error">
    <p>{{ error }}</p>
    <button (click)="error = null">Dismiss</button>
  </div>

  <div class="add-form">
    <h3>Add Product</h3>
    <input type="text" placeholder="Name" [(ngModel)]="newProduct.name" />
    <input type="number" placeholder="Price" [(ngModel)]="newProduct.price" min="0.01" step="0.01" />
    <button (click)="addProduct()" class="btn-add">Add</button>
  </div>

  <div *ngIf="loading" class="loading"><p>Loading...</p></div>

  <div *ngIf="!loading" class="product-list">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Price</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let product of products">
          <ng-container *ngIf="editingId !== product._id">
            <td>{{ product.name }}</td>
            <td>{{ product.price | currency }}</td>
            <td>
              <button (click)="startEdit(product)" class="btn-edit">Edit</button>
              <button (click)="deleteProduct(product._id)" class="btn-delete">Delete</button>
            </td>
          </ng-container>
          <ng-container *ngIf="editingId === product._id">
            <td><input type="text" [(ngModel)]="editValues.name" /></td>
            <td><input type="number" [(ngModel)]="editValues.price" min="0.01" step="0.01" /></td>
            <td>
              <button (click)="saveEdit(product._id)" class="btn-save">Save</button>
              <button (click)="cancelEdit()" class="btn-cancel">Cancel</button>
            </td>
          </ng-container>
        </tr>
      </tbody>
    </table>

    <div *ngIf="products.length === 0" class="no-data">
      <p>No products yet.</p>
    </div>
  </div>
</div>
