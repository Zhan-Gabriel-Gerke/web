<div class="products-container">
  <h2>Products</h2>

  <div *ngIf="loading" class="loading">
    <p>Loading products...</p>
  </div>

  <div *ngIf="error" class="error">
    <p>{{ error }}</p>
    <button (click)="loadProducts()">Retry</button>
  </div>

  <div *ngIf="!loading && !error && products.length > 0" class="product-list">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let product of products">
          <td>{{ product.id }}</td>
          <td>{{ product.name }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="!loading && products.length === 0 && !error" class="no-data">
    <p>No products] available</p>
  </div>
</div>
