<div class="cart-container">
  <h2>Shopping Cart</h2>

  <div *ngIf="cart.length === 0" class="empty-cart">
    <p>Your cart is empty</p>
  </div>

  <div *ngIf="cart.length > 0" class="cart-list">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Price</th>
          <th>Quantity</th>
          <th>Subtotal</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of cart">
          <td>{{ item.name }}</td>
          <td>{{ item.price | currency }}</td>
          <td>
            <input
              type="number"
              min="1"
              [value]="item.quantity"
              (change)="updateQuantity(item._id, $any($event.target).value)">
          </td>
          <td>{{ (item.price * item.quantity) | currency }}</td>
          <td>
            <button (click)="removeItem(item._id)" class="btn-remove">Remove</button>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="cart-summary">
      <div class="summary-row">
        <span>Total Items:</span>
        <strong>{{ getTotalItems() }}</strong>
      </div>
      <div class="summary-row total">
        <span>Total Price:</span>
        <strong>{{ getTotalPrice() | currency }}</strong>
      </div>
    </div>

    <button (click)="checkout()" class="btn-checkout">Checkout</button>
    <br />
    <button (click)="clearCart()" class="btn-clear">Clear Cart</button>
  </div>
</div>
