<div class="cart-container">
  <h2>Shopping Cart</h2>

  <div *ngIf="cart.length === 0" class="empty-cart">
    <p>Your cart is empty</p>
  </div>

  <div *ngIf="cart.length > 0" class="cart-list">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Price</th>
          <th>Quantity</th>
          <th>Subtotal</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of cart">
          <td>{{ item.id }}</td>
          <td>{{ item.name }}</td>
          <td>${{ item.price }}</td>
          <td>
            <input 
              type="number" 
              min="1" 
              [value]="item.quantity"
              (change)="updateQuantity(item.id, $any($event.target).value)">
          </td>
          <td>${{ (parseFloat(item.price) * item.quantity).toFixed(2) }}</td>
          <td>
            <button (click)="removeItem(item.id)" class="btn-remove">Remove</button>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="cart-summary">
      <div class="summary-row">
        <span>Total Items:</span>
        <strong>{{ getTotalItems() }}</strong>
      </div>
      <div class="summary-row">
        <span>Total Price:</span>
        <strong>${{ getTotalPrice().toFixed(2) }}</strong>
      </div>
    </div>

    <button (click)="clearCart()" class="btn-clear">Clear Cart</button>
  </div>
</div>
